name: Get anything

on:
  workflow_dispatch:
    inputs:
      link:
        description: 'Link to run wget on.'
        type: string
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: get file and push
        run: |
          wget ${{ inputs.link }}
          git config --global user.email "Boss-1s[BOT]@users.noreply.gihub.com"
          git config --global user.name "Boss-1s[BOT]"
          bash push.sh
